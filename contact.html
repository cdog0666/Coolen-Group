<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Coolen Group</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- NAV -->
    <nav class="nav">
      <div class="logo">COOLEN GROUP</div>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="founder.html">Founder</a>
        <a href="holdings.html">Holdings</a>
        <a href="coolen-ai.html">Coolen AI</a>
        <a href="contact.html" class="active">Contact</a>
      </div>
    </nav>

    <!-- HEADER -->
    <section class="section" style="padding-top: 140px">
      <h1>Contact</h1>
      <p
        style="
          color: rgba(255, 255, 255, 0.7);
          max-width: 700px;
          margin: 20px auto;
        "
      >
        Get in touch with Coolen Group for partnerships, integrations, or
        inquiries.
      </p>
    </section>

    <!-- CONTACT FORM -->
    <section class="section dark">
      <div style="max-width: 700px; margin: auto; text-align: left">
        <form>
          <label>Name</label>
          <input
            type="text"
            placeholder="Your Name"
            style="
              width: 100%;
              padding: 12px;
              margin: 10px 0 20px;
              background: #0b0f17;
              border: 1px solid rgba(255, 255, 255, 0.1);
              color: white;
              border-radius: 8px;
            "
          />

          <label>Email</label>
          <input
            type="email"
            placeholder="you@example.com"
            style="
              width: 100%;
              padding: 12px;
              margin: 10px 0 20px;
              background: #0b0f17;
              border: 1px solid rgba(255, 255, 255, 0.1);
              color: white;
              border-radius: 8px;
            "
          />

          <label>Message</label>
          <textarea
            rows="6"
            placeholder="Tell us about your inquiry..."
            style="
              width: 100%;
              padding: 12px;
              margin: 10px 0 20px;
              background: #0b0f17;
              border: 1px solid rgba(255, 255, 255, 0.1);
              color: white;
              border-radius: 8px;
            "
          ></textarea>

          <button
            type="submit"
            class="btn primary"
            style="border: none; cursor: pointer"
          >
            Send Message
          </button>
        </form>
      </div>
    </section>

    <!-- INFO -->
    <section class="section">
      <h2>Direct Contact</h2>

      <p style="color: rgba(255, 255, 255, 0.7)">
        Email: contact@coolengroup.com
      </p>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <p>© 2026 Coolen Group. All rights reserved.</p>
    </footer>
  </body>
</html>
